name: .NET CI Pipeline

on:
  push:
    branches: [ "feature/react" ]
  pull_request:
    branches: [ "feature/react" ]

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'

jobs:

# ─────────────────────────────────────────────
# TEST + BUILD
# ─────────────────────────────────────────────
  test-build:
    name: .NET Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # FIX: correct project path
      - name: Restore
        run: dotnet restore ./src/HelloDotnetApp/HelloDotnetApp.csproj

      - name: Build
        run: dotnet build ./src/HelloDotnetApp/HelloDotnetApp.csproj --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test ./src/HelloDotnetApp/HelloDotnetApp.csproj --configuration Release --no-build --logger trx

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-test-results
          path: "**/*.trx"

# ─────────────────────────────────────────────
# PUBLISH ARTIFACT
# ─────────────────────────────────────────────
  publish:
    name: Publish .NET App
    runs-on: ubuntu-latest
    needs: test-build
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: dotnet publish ./src/HelloDotnetApp/HelloDotnetApp.csproj -c Release -o out

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: out

# ─────────────────────────────────────────────
# RELEASE
# ─────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: out

      - name: Generate Version
        run: |
          DATE=$(date +'%Y%m%d')
          echo "TAG=dotnet-build-$DATE.${{ github.run_number }}" >> $GITHUB_ENV
          echo "NAME=.NET Build $DATE.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.NAME }}
          body: |
            .NET Build Release
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
          files: out/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
