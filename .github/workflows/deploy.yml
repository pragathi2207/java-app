name: React CI Pipeline

on:
  push:
    branches: [ "feature/react", "master", "main", "develop" ]
  pull_request:
    branches: [ "feature/react", "master", "main", "develop" ]

permissions:
  contents: write

env:
  NODE_VERSION: '20.x'
  APP_PATH: .

concurrency:
  group: react-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────
  # STAGE 1 — PR Validation
  # ─────────────────────────────────────────────────────────
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install
        working-directory: ${{ env.APP_PATH }}

      - name: Build
        run: npm run build
        working-directory: ${{ env.APP_PATH }}

      - name: Run tests (if any)
        run: npm test -- --watchAll=false
        working-directory: ${{ env.APP_PATH }}
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # STAGE 2 — Build & Release
  # ─────────────────────────────────────────────────────────
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: pr-validation
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install
        working-directory: ${{ env.APP_PATH }}

      - name: Build
        run: npm run build
        working-directory: ${{ env.APP_PATH }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-app
          path: build/
          retention-days: 30

      - name: Generate release metadata
        id: meta
        run: |
          DATE=$(date +'%Y%m%d')
          echo "tag=react-build-${DATE}.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "name=React Build ${DATE}.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Zip build
        run: zip -r react-app.zip build/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          files: react-app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}