name: DotNet IIS CI-CD

on:
  push:
    branches:
      - feature/iis

  pull_request:
    branches:
      - feature/iis

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  IMAGE_NAME: dotnet-iis-app
  CONTAINER_NAME: dotnet-iis-container

jobs:

  # ==================================================
  # PR VALIDATION
  # ==================================================
  pr-validation:

    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Packages
        run: |
          dotnet restore src/HelloDotnetApp/HelloDotnetApp.csproj

      - name: Build Application
        run: |
          dotnet build src/HelloDotnetApp/HelloDotnetApp.csproj \
          --configuration Release

  # ==================================================
  # BUILD STAGE
  # ==================================================
  build:

    if: github.event_name != 'pull_request'

    runs-on: ubuntu-latest

    outputs:
      imageTag: ${{ steps.tag.outputs.tag }}

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Packages
        run: |
          dotnet restore src/HelloDotnetApp/HelloDotnetApp.csproj

      - name: Publish Application
        run: |
          dotnet publish src/HelloDotnetApp/HelloDotnetApp.csproj \
          -c Release \
          -o publish

      - name: Verify Publish Files
        run: |
          ls -ltr publish/

      # ===============================================
      # ARTIFACT UPLOAD
      # ===============================================
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-build-artifact
          path: publish/

      - name: Generate Image Tag
        id: tag
        run: |
          echo "tag=${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      # ===============================================
      # LOGIN TO ACR
      # ===============================================
      - name: Docker Login to ACR
        run: |
          docker login ${{ env.ACR_NAME }} \
          -u ${{ secrets.ACR_USERNAME }} \
          -p ${{ secrets.ACR_PASSWORD }}

      # ===============================================
      # BUILD IMAGE
      # ===============================================
      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} .

      - name: Verify Docker Images
        run: docker images

      # ===============================================
      # PUSH IMAGE
      # ===============================================
      - name: Push Docker Image
        run: |
          docker push \
          ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

  # ==================================================
  # DEPLOY STAGE
  # ==================================================
  deploy:

    needs: build

    runs-on: [self-hosted, Linux, X64, vm]

    environment:
      name: prod

    steps:

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-artifact

      - name: Verify Downloaded Artifact
        run: |
          ls -ltr

      # ===============================================
      # LOGIN TO ACR
      # ===============================================
      - name: Docker Login to ACR
        run: |
          docker login ${{ env.ACR_NAME }} \
          -u ${{ secrets.ACR_USERNAME }} \
          -p ${{ secrets.ACR_PASSWORD }}

      # ===============================================
      # PULL IMAGE
      # ===============================================
      - name: Pull Docker Image
        run: |
          docker pull \
          ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.imageTag }}

      # ===============================================
      # STOP OLD CONTAINER
      # ===============================================
      - name: Stop Existing Container
        run: |
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

      # ===============================================
      # DEPLOY NEW CONTAINER
      # ===============================================
      - name: Run Container
        run: |
          docker run -d \
          --name ${{ env.CONTAINER_NAME }} \
          -p 80:80 \
          ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.imageTag }}

      # ===============================================
      # VERIFY DEPLOYMENT
      # ===============================================
      - name: Verify Running Container
        run: docker ps