name: Java CI Pipeline

on:
  push:
    branches: [ "master", "main", "develop" ]
  pull_request:
    branches: [ "master", "main", "develop" ]

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

permissions:
  contents: write

jobs:

  # ═══════════════════════════════════════════════════════════
  # STAGE 1 — PR Validation
  # Visible as a single node in the GitHub Actions graph.
  # Runs unit tests then integration tests sequentially.
  # ═══════════════════════════════════════════════════════════
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper
            chmod +x ./gradlew
          fi

      # ── Unit Tests + Coverage ──────────────────────────────
      - name: Run unit tests
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: build/reports/jacoco/test/html/
          retention-days: 7

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: build/reports/tests/test/
          retention-days: 7

      # ── Integration Tests ──────────────────────────────────
      - name: Run integration tests
        run: ./gradlew integrationTest

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: build/reports/tests/integrationTest/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # STAGE 2 — Build & Deploy
  # Visible as a single node in the GitHub Actions graph.
  # Only runs on push (not PRs). Requires Stage 1 to pass.
  # Builds the WAR then creates a GitHub Release.
  # ═══════════════════════════════════════════════════════════
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: pr-validation
    if: github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper
            chmod +x ./gradlew
          fi

      # ── Build WAR ──────────────────────────────────────────
      - name: Build WAR
        run: ./gradlew war -x test

      - name: Generate build metadata
        id: meta
        run: |
          BUILD_DATE=$(date +'%Y%m%d')
          BUILD_NAME="Build ${BUILD_DATE}.${{ github.run_number }}"
          TAG_NAME="build-${BUILD_DATE}.${{ github.run_number }}"
          VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')

          echo "build_name=$BUILD_NAME"   >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME"       >> $GITHUB_OUTPUT
          echo "app_version=$VERSION"     >> $GITHUB_OUTPUT

          echo "=== WAR in build/libs/ ==="
          ls -lh build/libs/*.war

      - name: Upload WAR as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: javaapp-${{ steps.meta.outputs.app_version }}-build-${{ github.run_number }}
          path: build/libs/*.war
          if-no-files-found: error
          retention-days: 30

      # ── GitHub Release ─────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.build_name }}
          body: |
            ## ${{ steps.meta.outputs.build_name }}

            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **Version:** `${{ steps.meta.outputs.app_version }}`
            **Triggered by:** ${{ github.actor }}

            ### What's included
            - WAR built from commit ${{ github.sha }}
            - All unit tests passed
            - All integration tests passed
            - Code coverage >= 80%
          files: build/libs/*.war
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
