name: Java CI Pipeline
 
on:
  push:
    branches: [ "master", "main", "develop" ]
  pull_request:
    branches: [ "master", "main", "develop" ]
 
env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
 
jobs:
 
  # ─────────────────────────────────────────────
  # JOB 1 — Unit Tests + Code Coverage (JaCoCo)
  # ─────────────────────────────────────────────
  unit-test:
    name: Unit Tests & Code Coverage
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
 
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
 
      - name: Make mvnw executable
        run: chmod +x ./mvnw
 
      - name: Run unit tests + coverage check
        run: ./mvnw --batch-mode verify -P unit-tests
 
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 7
 
      - name: Upload surefire test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: target/surefire-reports/
          retention-days: 7
 
  # ─────────────────────────────────────────────
  # JOB 2 — Integration Tests
  # ─────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test
 
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
 
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
 
      - name: Make mvnw executable
        run: chmod +x ./mvnw
 
      - name: Run integration tests
        run: |
          ./mvnw --batch-mode verify \
            -DskipUnitTests=true \
            -P integration-tests
 
      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: target/failsafe-reports/
          retention-days: 7
 
  # ─────────────────────────────────────────────
  # JOB 3 — Build & Upload WAR Artifact
  # ─────────────────────────────────────────────
  build-artifact:
    name: Build WAR Artifact
    runs-on: ubuntu-latest
    needs: [ unit-test, integration-test ]
 
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
 
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
 
      - name: Make mvnw executable
        run: chmod +x ./mvnw
 
      - name: Build WAR
        run: ./mvnw --batch-mode package -DskipTests
 
      - name: Read project version and locate WAR
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "=== WARs in target/ ==="
          ls -lh target/*.war
 
      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: javaapp-${{ env.APP_VERSION }}-build-${{ github.run_number }}
          path: target/*.war
          if-no-files-found: error
          retention-days: 30
 
      - name: Create GitHub Release on tag push
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/*.war
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
