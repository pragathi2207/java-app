name: JavaAPP-Federated-VM-Deploy

on:
  pull_request:
    branches: [ "master" ]

  push:
    branches: [ "master" ]

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: javaapp
  IMAGE_NAME: javaapp
  RESOURCE_GROUP: test-rg
  VM_NAME: vm2

jobs:

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build + Test
        run: mvn clean package test

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build Docker Image
        run: docker build -t javaapp:latest .
      - name: Deploy container on Azure VM
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az vm run-command invoke \
              --resource-group $RESOURCE_GROUP \
              --name $VM_NAME \
              --command-id RunShellScript \
              --scripts "
                docker stop javaapp || true &&
                docker rm javaapp || true &&
                docker run -d -p 8080:8080 --name javaapp javaapp:latest
              "
