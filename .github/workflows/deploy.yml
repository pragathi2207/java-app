name: React NGINX CI-CD

on:
  push:
    branches:
      - feature/react

  pull_request:
    branches:
      - feature/react

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  IMAGE_NAME: react-nginx-app
  CONTAINER_NAME: react-nginx-container

jobs:

  # ==================================================
  # PR VALIDATION
  # ==================================================
  pr-validation:

    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

  # ==================================================
  # BUILD STAGE
  # ==================================================
  build:

    if: github.event_name != 'pull_request'

    runs-on: ubuntu-latest

    outputs:
      imageTag: ${{ steps.tag.outputs.tag }}

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build React Application
        run: npm run build

      - name: Verify Build Folder
        run: |
          ls -ltr build/

      # ===============================================
      # ARTIFACT UPLOAD
      # ===============================================
      - name: Upload React Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build-artifact
          path: build/

      - name: Generate Docker Tag
        id: tag
        run: |
          echo "tag=${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      # ===============================================
      # LOGIN TO ACR
      # ===============================================
      - name: Docker Login to ACR
        run: |
          docker login ${{ env.ACR_NAME }} \
          -u ${{ secrets.ACR_USERNAME }} \
          -p ${{ secrets.ACR_PASSWORD }}

      # ===============================================
      # BUILD IMAGE
      # ===============================================
      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} .

      - name: Verify Docker Images
        run: docker images

      # ===============================================
      # PUSH IMAGE
      # ===============================================
      - name: Push Docker Image
        run: |
          docker push \
          ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

  # ==================================================
  # DEPLOY STAGE
  # ==================================================
  deploy:

    needs: build

    runs-on: [self-hosted, Linux, X64, vm]

    environment:
      name: prod

    steps:

      - name: Download React Artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build-artifact

      - name: Verify Downloaded Artifact
        run: |
          ls -ltr

      # ===============================================
      # LOGIN TO ACR
      # ===============================================
      - name: Docker Login to ACR
        run: |
          docker login ${{ env.ACR_NAME }} \
          -u ${{ secrets.ACR_USERNAME }} \
          -p ${{ secrets.ACR_PASSWORD }}

      # ===============================================
      # PULL IMAGE
      # ===============================================
      - name: Pull Docker Image
        run: |
          docker pull \
          ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.imageTag }}

      # ===============================================
      # STOP OLD CONTAINER
      # ===============================================
      - name: Stop Existing Container
        run: |
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

      # ===============================================
      # DEPLOY NEW CONTAINER
      # ===============================================
      - name: Run Container
        run: |
          docker run -d \
          --name ${{ env.CONTAINER_NAME }} \
          -p 80:80 \
          ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.imageTag }}

      # ===============================================
      # VERIFY DEPLOYMENT
      # ===============================================
      - name: Verify Running Container
        run: docker ps