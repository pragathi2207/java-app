name: Java Tomcat CI-CD Pipeline

# =========================================================
# i) TRIGGERS
# =========================================================
on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

# =========================================================
# iv) VARIABLE GROUP EQUIVALENT
# GitHub Variables:
# Repo -> Settings -> Secrets and variables -> Actions
# =========================================================
env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  IMAGE_NAME: java-app
  CONTAINER_NAME: java-tomcat-container

jobs:

# =========================================================
# iii) PR VALIDATION
# =========================================================
  pr-validation:

    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      # =========================================================
      # ii) RESOURCES
      # =========================================================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Validate Maven Build
        run: mvn clean verify

# =========================================================
# BUILD STAGE
# =========================================================
  build:

    if: github.event_name != 'pull_request'

    runs-on: ubuntu-latest

    outputs:
      imageTag: ${{ steps.tag.outputs.tag }}

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================================================
      # BUILD WAR FILE
      # =========================================================
      - name: Build WAR File
        run: mvn clean package -DskipTests

      # =========================================================
      # SHOW GENERATED ARTIFACTS
      # =========================================================
      - name: Verify WAR Generated
        run: |
          echo "Listing target folder"
          ls -ltr target/

      # =========================================================
      # ARTIFACT UPLOAD (Azure DevOps equivalent)
      # =========================================================
      - name: Upload WAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-war-artifact
          path: target/*.war

      # =========================================================
      # GENERATE IMAGE TAG
      # =========================================================
      - name: Generate Docker Tag
        id: tag
        run: |
          echo "tag=${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      # =========================================================
      # v) CONNECT TO ACR
      # =========================================================
      - name: Login to Azure Container Registry
        run: |
          docker login ${{ env.ACR_NAME }} \
          -u ${{ secrets.ACR_USERNAME }} \
          -p ${{ secrets.ACR_PASSWORD }}

      # =========================================================
      # BUILD DOCKER IMAGE
      # =========================================================
      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} .

      - name: Verify Docker Images
        run: docker images

      # =========================================================
      # PUSH IMAGE TO ACR
      # =========================================================
      - name: Push Docker Image
        run: |
          docker push \
          ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

# =========================================================
# vi) DEPLOYMENT STAGE WITH APPROVAL
# =========================================================
  deploy:

    needs: build

    # =========================================================
    # vii) SELF HOSTED RUNNER VM
    # =========================================================
    runs-on: [self-hosted, Linux, X64, vm]

    # =========================================================
    # MANUAL APPROVAL ENVIRONMENT
    # =========================================================
    environment:
      name: production

    steps:

      # =========================================================
      # DOWNLOAD ARTIFACT (OPTIONAL DEMO)
      # =========================================================
      - name: Download WAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: java-war-artifact

      - name: Verify Downloaded Artifact
        run: |
          echo "Downloaded artifacts:"
          ls -ltr

      # =========================================================
      # LOGIN TO ACR
      # =========================================================
      - name: Login to Azure Container Registry
        run: |
          docker login ${{ env.ACR_NAME }} \
          -u ${{ secrets.ACR_USERNAME }} \
          -p ${{ secrets.ACR_PASSWORD }}

      # =========================================================
      # PULL IMAGE
      # =========================================================
      - name: Pull Docker Image
        run: |
          docker pull \
          ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.imageTag }}

      # =========================================================
      # STOP OLD CONTAINER
      # =========================================================
      - name: Stop Existing Container
        run: |
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

      # =========================================================
      # DEPLOY NEW CONTAINER
      # =========================================================
      - name: Deploy Container
        run: |
          docker run -d \
          --name ${{ env.CONTAINER_NAME }} \
          -p 8080:8080 \
          ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.imageTag }}

      # =========================================================
      # VERIFY DEPLOYMENT
      # =========================================================
      - name: Verify Running Containers
        run: docker ps

      - name: Verify Tomcat Webapps
        run: |
          docker exec ${{ env.CONTAINER_NAME }} ls /usr/local/tomcat/webapps/
