name: JavaAPP

on:
  pull_request:
    branches: [ "master" ]

  push:
    branches: [ "master" ]

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: javaapp

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build and Test
        run: mvn clean package test


  deploy:
    needs: build-test
    runs-on: [self-hosted, linux, vm2]

    environment:
      name: prod

    steps:
      - uses: actions/checkout@v4

      - name: Build WAR on VM
        run: mvn clean package

      - name: Stop existing container
        run: docker stop javaapp || true

      - name: Remove existing container
        run: docker rm javaapp || true

      - name: Build Docker image
        run: docker build -t javaapp:latest .

      - name: Run container
        run: docker run -d -p 8080:8080 --name javaapp javaapp:latest

      - name: Health check
        run: curl -f http://localhost:8080/javaapp/ || exit 1