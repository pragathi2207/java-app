name: Java CI Pipeline

on:
  push:
    branches: [ "master", "main", "develop" ]
  pull_request:
    branches: [ "master", "main", "develop" ]

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Unit Tests + Code Coverage (JaCoCo)
  # ─────────────────────────────────────────────
  unit-test:
    name: Unit Tests & Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Run unit tests + coverage check
        run: ./mvnw --batch-mode verify -P unit-tests

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Upload surefire test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2 — Integration Tests
  # ─────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Run integration tests
        run: |
          ./mvnw --batch-mode verify \
            -DskipUnitTests=true \
            -P integration-tests

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: target/failsafe-reports/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3 — Build WAR + Create GitHub Release
  # ─────────────────────────────────────────────
  build-artifact:
    name: Build WAR Artifact
    runs-on: ubuntu-latest
    needs: [ unit-test, integration-test ]
    # Only create a release on pushes to master/main, not on PRs
    if: github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build WAR
        run: ./mvnw --batch-mode package -DskipTests

      - name: Generate build metadata
        run: |
          # Build name matches format: Build YYYYMMDD.N  (e.g. Build 20260529.17)
          BUILD_DATE=$(date +'%Y%m%d')
          BUILD_NAME="Build ${BUILD_DATE}.${{ github.run_number }}"
          TAG_NAME="build-${BUILD_DATE}.${{ github.run_number }}"
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)

          echo "BUILD_NAME=$BUILD_NAME"   >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME"       >> $GITHUB_ENV
          echo "APP_VERSION=$VERSION"     >> $GITHUB_ENV

          echo "=== WAR in target/ ==="
          ls -lh target/*.war

      - name: Upload WAR as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: javaapp-${{ env.APP_VERSION }}-build-${{ github.run_number }}
          path: target/*.war
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.BUILD_NAME }}
          body: |
            ## ${{ env.BUILD_NAME }}

            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **Version:** `${{ env.APP_VERSION }}`
            **Triggered by:** ${{ github.actor }}

            ### What's included
            - WAR built from commit ${{ github.sha }}
            - All unit tests passed
            - All integration tests passed
            - Code coverage >= 80%
          files: target/*.war
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
